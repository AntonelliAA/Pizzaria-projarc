spring:
  application:
    name: estoque-service
  datasource:
    url: jdbc:h2:mem:estoquedb
    username: sa
    password:
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    # roda o data.sql DEPOIS de o Hibernate criar as tabelas (senão o INSERT falha no boot)
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
