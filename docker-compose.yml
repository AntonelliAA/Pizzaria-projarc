services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  pizzaria-service:
    build: ./pizzaria-service
    container_name: pizzaria-service
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
    expose:
      - "8081"
    depends_on:
      eureka-server:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      JWT_SECRET: troque-esta-chave-secreta-de-no-minimo-32-bytes!!
      JWT_EXP_MIN: "480"
    depends_on:
      eureka-server:
        condition: service_healthy

  estoque-service:
    build: ./estoque-service
    container_name: estoque-service
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
    expose:
      - "8082"
    depends_on:
      eureka-server:
        condition: service_healthy
