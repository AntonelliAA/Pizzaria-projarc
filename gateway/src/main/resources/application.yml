server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: pizzaria
          uri: lb://pizzaria-service
          predicates:
            - Path=/clientes/**,/cardapio/**,/pedidos/**,/admin/**,/docs/**,/swagger-ui/**,/v3/api-docs/**
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
jwt:
  secret: ${JWT_SECRET:troque-esta-chave-secreta-de-no-minimo-32-bytes!!}
  expiracao-min: ${JWT_EXP_MIN:480}
